server:
  port: 18080

spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:/Users/zhouyu/IdeaProjects/SQL_Copilot/sql-copilot.db
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  type-aliases-package: com.sqlcopilot.studio.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.sqlcopilot.studio: info

schema:
  cache:
    ttl-ms: 300000
    refresh-interval-ms: 180000
    refresh-initial-delay-ms: 60000
  table-stats:
    refresh-interval-ms: 60000

rag:
  enabled: true
  qdrant:
    url: http://127.0.0.1:6333
    api-key: ""
    upsert-batch-size: 300
  collection:
    schema-table: schema_table
    schema-column: schema_column
    sql-history: sql_history
    metric-term: metric_term
    example-sql: example_sql
    sql-fragment: sql_fragment
  embedding:
    model-file-name: model_optimized.onnx
    model-data-file-name: model_optimized.onnx.data
    tokenizer-file-name: tokenizer.json
    tokenizer-config-file-name: tokenizer_config.json
    config-file-name: config.json
    special-tokens-file-name: special_tokens_map.json
    sentencepiece-file-name: sentencepiece.bpe.model
    max-seq-len: 512
    fallback-dimension: 1024
    execution-provider: AUTO
    cuda-device-id: 0
    directml-device-id: 0
    coreml-flags: "ENABLE_ON_SUBGRAPH,ONLY_ENABLE_DEVICE_WITH_ANE"
    batch-size: 16
    parallelism: 2
  retrieval:
    schema-table-limit: 10
    schema-column-limit: 20
    sql-history-limit: 8
    metric-term-limit: 6
    example-sql-limit: 6
  rerank:
    enabled: false
    alpha: 0.65
    beta: 0.30
    gamma: 0.05
  sql-fragment:
    enabled: true
    max-count: 8
